firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();

window.fbUser = null;
window.fbSyncStatus = "";
window.fbSignOut = () => {localStorage.removeItem("ept:accessCache");fbAuth.signOut().then(() => window.location.reload());};

let _syncTimer = null;
function syncToCloud() {
  if (!window.fbUser) return;
  const store = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("ept:")) store[k.slice(4)] = localStorage.getItem(k);
  }
  fbDb.collection("users").doc(window.fbUser.uid).set({
    data: JSON.stringify(store),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    displayName: window.fbUser.displayName || "",
    email: window.fbUser.email || ""
  }, {merge: true}).then(() => {
    window.fbSyncStatus = "Synced " + new Date().toLocaleTimeString();
  }).catch(e => {
    window.fbSyncStatus = "Sync failed";
    console.warn("Cloud save failed", e);
  });
}
function debounceSyncToCloud() {
  localStorage.setItem("ept:lastActive", String(Date.now()));
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToCloud, 2000);
}

async function syncFromCloud() {
  if (!window.fbUser) return;
  // Don't overwrite local data if user was active in last 30 seconds
  const lastLocal=parseInt(localStorage.getItem("ept:lastActive")||"0");
  if(Date.now()-lastLocal<30000){window.fbSyncStatus="Skipped (recent local activity)";return;}
  try {
    const doc = await fbDb.collection("users").doc(window.fbUser.uid).get();
    if (doc.exists && doc.data().data) {
      const cloud = JSON.parse(doc.data().data);
      Object.entries(cloud).forEach(([k, v]) => {
        localStorage.setItem("ept:" + k, v);
      });
      window.fbSyncStatus = "Loaded from cloud";
    }
  } catch (e) {
    console.warn("Cloud load failed", e);
  }
}

window.storage = {
  async get(key) {
    const val = localStorage.getItem("ept:" + key);
    if (val === null) throw new Error("Key not found: " + key);
    return { key, value: val };
  },
  async set(key, value) {
    localStorage.setItem("ept:" + key, typeof value === "string" ? value : JSON.stringify(value));
    debounceSyncToCloud();
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem("ept:" + key);
    debounceSyncToCloud();
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    const pre = "ept:" + (prefix || "");
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith(pre)) keys.push(k.slice(4));
    }
    return { keys };
  }
};

function useDebounce(value, delay = DEBOUNCE_DELAY_MS) {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const handler = setTimeout(() => setDebounced(value), delay);
    return () => clearTimeout(handler);
  }, [value, delay]);
  return debounced;
}

const ingMax=ing=>ing.constraints?.limit_range[1]??ing.maxAmt??9999;

  return ingDiscrete(ing)?Math.max(mn,Math.min(mx,Math.round(raw))):Math.max(mn,Math.min(mx,Math.round(raw/stp)*stp));};

function ci(ing,a){if(!ing)return{cals:0,p:0,c:0,f:0};if(ing.unit==="piece"){const u=ing.perUnit;return{cals:Math.round(u.cals*a),p:+(u.p*a).toFixed(1),c:+(u.c*a).toFixed(1),f:+(u.f*a).toFixed(1)};}const r=a/100,u=ing.per100;return{cals:Math.round(u.cals*r),p:+(u.p*r).toFixed(1),c:+(u.c*r).toFixed(1),f:+(u.f*r).toFixed(1)};}
function sm(m,im){const t={cals:0,p:0,c:0,f:0};m.items.forEach(it=>{const s=ci(im[it.ingId],it.amt);t.cals+=s.cals;t.p+=s.p;t.c+=s.c;t.f+=s.f;});return t;}
function sa(ms,im){const t={cals:0,p:0,c:0,f:0};ms.forEach(m=>{const s=sm(m,im);t.cals+=s.cals;t.p+=s.p;t.c+=s.c;t.f+=s.f;});return t;}

// Classify ingredient by dominant macro role
// ═══════════════════════════════════════════════════════════
// ENGINE — Rebalancing, Micro Analysis, Synergy Checks
// ═══════════════════════════════════════════════════════════
function macroRole(ing){
  if(!ing)return"c";
  const n=ing.per100||ing.perUnit||{};
  // Explicit protein sources
  if(["Protein","Dairy"].includes(ing.cat))return"p";
  // Fat-dominant
  if(ing.cat==="Fats")return"f";
  if(n.f>n.p&&n.f>n.c)return"f";
  // Everything else is carb/fibre
  return"c";
}

function autoRebalance(meals,tgt,im,doneIds,pref,bodyWt){
  // Circuit breaker: prevent runaway repeated calls
  if (typeof autoRebalance._callCount === 'undefined') {
    autoRebalance._callCount = 0;
  }
  if (++autoRebalance._callCount > 20) {
    console.warn('autoRebalance circuit breaker triggered – aborting further adjustments');
    return meals;
  }
  const carbW=pref==="high-carb"?1.4:pref==="high-fat"?0.6:1.0;
  const fatW=pref==="high-fat"?1.4:pref==="high-carb"?0.6:1.0;
  const fatFloor=(bodyWt||83)*0.6; // minimum fat grams (0.6g/kg) for hormonal health
  // Training window 18:00–22:00: simple carbs prioritised; outside: complex carbs
  const _h=new Date().getHours();const isTrainWin=_h>=18&&_h<22;
  meals=dc(meals);const done=new Set(doneIds||[]);
  // Calculate locked calories
  let lk=0;meals.forEach(m=>{if(m.fixed||done.has(m.id)){lk+=sm(m,im).cals;return;}m.items.forEach(it=>{if(it.locked)lk+=ci(im[it.ingId],it.amt).cals;});});
  const adj=meals.filter(m=>!m.fixed&&!done.has(m.id));if(!adj.length)return meals;
  const bud=tgt-lk;

  // Split unlocked items by macro role
  const items=adj.flatMap(m=>m.items).filter(it=>!it.locked);
  const pItems=items.filter(it=>macroRole(im[it.ingId])==="p");
  const cfItems=items.filter(it=>macroRole(im[it.ingId])!=="p"); // carbs + fats

  // If budget is zero or negative, locked items already exceed target — 
  // reduce ALL unlocked items to their constraint minimums
  if(bud<=0){
    items.forEach(it=>{const ing=im[it.ingId];if(!ing)return;it.amt=clampAmt(ing,ingMin(ing));});
    return meals;
  }

  // Calculate current calories by group
  const pCals=pItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
  const cfCals=cfItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
  const totalUnlocked=pCals+cfCals;
  if(!totalUnlocked)return meals;

  const needCut=totalUnlocked>bud; // over budget = need to cut
  const diff=bud-totalUnlocked; // positive = need more, negative = need less
  // How severe is the overshoot? Scale aggressiveness accordingly
  const overPct=needCut?Math.abs(diff)/bud:0; // e.g. 0.3 = 30% over

  if(needCut){
    // CUTTING: Sort by caloric density — cut "invisible" high-cal items first, preserve volume
    const giPen=ing=>(macroRole(ing)==="c"&&((isTrainWin&&carbGI(ing)==="complex")||(!isTrainWin&&carbGI(ing)==="simple")))?1.5:1;
    const cfSorted=[...cfItems].sort((a,b)=>{
      const da=(im[a.ingId]?.per100?.cals||im[a.ingId]?.perUnit?.cals||100)*giPen(im[a.ingId]);
      const db=(im[b.ingId]?.per100?.cals||im[b.ingId]?.perUnit?.cals||100)*giPen(im[b.ingId]);
      return db-da; // highest effective density first
    });
    const cfBudget=bud-pCals;
    if(cfBudget>0&&cfCals>0){
      // Phase 1: Cut high-density items aggressively, low-density items gently
      // Scale cut limits with overshoot severity (overPct > 0.2 → more aggressive)
      const aggro=Math.min(1,0.6+overPct); // 0.6–1.0 range
      let remaining=cfCals-cfBudget; // how much we need to cut
      cfSorted.forEach(it=>{if(remaining<=0)return;const ing=im[it.ingId];if(!ing)return;
        const density=ing.per100?.cals||ing.perUnit?.cals||100;
        const mn=ingMin(ing);
        // Scale cut pct with aggro: at aggro=1.0 everything can be cut up to 90%
        const maxCutPct=density>200?Math.min(0.9,aggro):density>100?Math.min(0.7,aggro*0.8):Math.min(0.5,aggro*0.5);
        const maxCut=ci(ing,it.amt).cals*maxCutPct;
        const actualCut=Math.min(remaining,maxCut);
        const newCals=ci(ing,it.amt).cals-actualCut;
        const newAmt=clampAmt(ing,Math.max(mn,newCals/(density/100)));
        remaining-=(ci(ing,it.amt).cals-ci(ing,newAmt).cals);
        it.amt=newAmt;
      });
      // Phase 2: If still over, do uniform scale on what's left (respect constraint mins)
      const afterP1=items.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      if(afterP1>bud+20){const leftover=cfItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
        if(leftover>0){const sc2=Math.max(0,(bud-pItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0))/leftover);
          cfItems.forEach(it=>{const ing=im[it.ingId];if(!ing)return;
            it.amt=clampAmt(ing,Math.max(ingMin(ing),it.amt*sc2));});}}
      // Phase 3: Still over — reluctantly trim protein (respect constraint mins)
      const afterCF=items.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      if(afterCF>bud+20){
        const pBud=bud-cfItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
        const curP=pItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
        if(curP>0&&pBud>0){const pScale=pBud/curP;
          pItems.forEach(it=>{const ing=im[it.ingId];if(!ing)return;
            it.amt=clampAmt(ing,Math.max(ingMin(ing),it.amt*pScale));});}
      }
    } else {
      // cfBudget <= 0: carb/fat budget exhausted by protein — cut everything to minimums then scale up to bud
      items.forEach(it=>{const ing=im[it.ingId];if(!ing)return;it.amt=clampAmt(ing,ingMin(ing));});
      // Now scale back up if there's room
      const minCals=items.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      if(minCals<bud&&minCals>0){
        const sc=bud/minCals;
        cfItems.forEach(it=>{const ing=im[it.ingId];if(!ing)return;
          it.amt=clampAmt(ing,Math.min(ingMax(ing),it.amt*sc));});
      }
    }
  } else {
    // ADDING: Scale carbs/fats up first, then protein if needed
    const cfTarget=cfCals+diff; // give all extra to carbs/fats weighted by preference
    if(cfCals>0){
      // GI partitioning: split carbs into simple/complex, weighted by training window
      const cItems=cfItems.filter(it=>macroRole(im[it.ingId])==="c");
      const fItems2=cfItems.filter(it=>macroRole(im[it.ingId])==="f");
      const simpleItems=cItems.filter(it=>carbGI(im[it.ingId])==="simple");
      const complexItems=cItems.filter(it=>carbGI(im[it.ingId])==="complex");
      const sCals=simpleItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      const xCals=complexItems.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      const fCals2=fItems2.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      // Training window 18-22: simple 1.4×, complex 0.7×; outside: invert
      const sGI=isTrainWin?1.4*carbW:0.7*carbW;
      const xGI=isTrainWin?0.7*carbW:1.4*carbW;
      const wTotalGI=sCals*sGI+xCals*xGI+fCals2*fatW||1;
      const sShare=cfTarget*(sCals*sGI/wTotalGI);
      const xShare=cfTarget*(xCals*xGI/wTotalGI);
      const fShare=cfTarget*(fCals2*fatW/wTotalGI);
      const sScale=sCals>0?sShare/sCals:1;
      const xScale=xCals>0?xShare/xCals:1;
      const fScale2=fCals2>0?fShare/fCals2:1;
      cfItems.forEach(it=>{const ing=im[it.ingId];if(!ing)return;const stp=ing.step||5;const mx=ing.maxAmt||it.amt*2;
        const sc2=macroRole(ing)==="f"?fScale2:carbGI(ing)==="simple"?sScale:xScale;
        if(ing.unit==="piece")it.amt=Math.max(1,Math.min(mx,Math.round(it.amt*sc2)));
        else it.amt=Math.max(stp,Math.min(mx,Math.round((it.amt*sc2)/stp)*stp));});
      // If carbs/fats maxed out, overflow into protein
      const afterCF=items.reduce((s,it)=>s+ci(im[it.ingId],it.amt).cals,0);
      const remaining=bud-afterCF;
      if(remaining>20&&pCals>0){const pScale=(pCals+remaining)/pCals;
        pItems.forEach(it=>{const ing=im[it.ingId];if(!ing)return;const stp=ing.step||5;const mx=ing.maxAmt||it.amt*2;
          if(ing.unit==="piece")it.amt=Math.max(1,Math.min(mx,Math.round(it.amt*pScale)));
          else it.amt=Math.max(stp,Math.min(mx,Math.round((it.amt*pScale)/stp)*stp));});}
    } else {
      // No carb/fat items — scale protein
      const sc=bud/totalUnlocked;
      items.forEach(it=>{const ing=im[it.ingId];if(!ing)return;const stp=ing.step||5;const mx=ing.maxAmt||it.amt*2;
        if(ing.unit==="piece")it.amt=Math.max(1,Math.min(mx,Math.round(it.amt*sc)));
        else it.amt=Math.max(stp,Math.min(mx,Math.round((it.amt*sc)/stp)*stp));});
    }
  }

  // Gap fill pass — bump carbs/fats first by their step, preferred GI type first
  let gap2=tgt-sa(meals,im).cals;
  const preferredGI=isTrainWin?"simple":"complex";
  const cfBumps=cfItems.filter(it=>im[it.ingId]?.unit!=="piece")
    .sort((a,b)=>{const ap=carbGI(im[a.ingId])===preferredGI?0:1;const bp=carbGI(im[b.ingId])===preferredGI?0:1;return ap-bp;});
  const pBumps=pItems.filter(it=>im[it.ingId]?.unit!=="piece");
  let tries=0;
  // UNDER target — bump up
  while(gap2>10&&tries<20){tries++;
    for(const it of cfBumps){if(gap2<=10)break;const ing=im[it.ingId];if(!ing||it.amt>=ingMax(ing))continue;const stp=ing.step||5;it.amt=Math.min(ingMax(ing),it.amt+stp);gap2=tgt-sa(meals,im).cals;}
    if(gap2<=10)break;
    for(const it of pBumps){if(gap2<=10)break;const ing=im[it.ingId];if(!ing||it.amt>=ingMax(ing))continue;const stp=ing.step||5;it.amt=Math.min(ingMax(ing),it.amt+stp);gap2=tgt-sa(meals,im).cals;}
  }
  // OVER target — trim down (reverse of bump: reduce by step, highest density first)
  const cfTrims=[...cfItems].filter(it=>im[it.ingId]?.unit!=="piece")
    .sort((a,b)=>{const da=im[a.ingId]?.per100?.cals||100;const db=im[b.ingId]?.per100?.cals||100;return db-da;});
  const pTrims=pItems.filter(it=>im[it.ingId]?.unit!=="piece");
  let tries2=0;
  while(gap2<-10&&tries2<20){tries2++;
    let trimmed=false;
    for(const it of cfTrims){if(gap2>=-10)break;const ing=im[it.ingId];if(!ing)continue;const mn=ingMin(ing);const stp=ing.step||5;
      if(it.amt<=mn)continue;it.amt=Math.max(mn,it.amt-stp);gap2=tgt-sa(meals,im).cals;trimmed=true;}
    if(gap2>=-10)break;
    for(const it of pTrims){if(gap2>=-10)break;const ing=im[it.ingId];if(!ing)continue;const mn=ingMin(ing);const stp=ing.step||5;
      if(it.amt<=mn)continue;it.amt=Math.max(mn,it.amt-stp);gap2=tgt-sa(meals,im).cals;trimmed=true;}
    if(!trimmed)break; // all items at minimum, can't trim further
  }
  // Overflow: if gap remains and some items hit their constraint max, route into secondary carbs in the same meal
  const postGap=tgt-sa(meals,im).cals;
  if(postGap>20)meals=overflowToSecondaryCarb(meals,postGap,im);

  // Protein cap
  let tot=sa(meals,im);if(tot.p>PMAX){const w=adj.flatMap(m=>m.items).find(it=>it.ingId==="whey"&&!it.locked);
    if(w&&w.amt>15){w.amt=Math.max(15,w.amt-Math.round((tot.p-PMAX)/0.9));}}
  // Fat floor guardrail — prevent hormonal crash from ultra-low fat
  tot=sa(meals,im);if(tot.f<fatFloor){
    const fatItems=adj.flatMap(m=>m.items).filter(it=>!it.locked&&["Fats","Snack"].includes(im[it.ingId]?.cat));
    const deficit=fatFloor-tot.f;let added=0;
    for(const it of fatItems){if(added>=deficit)break;const ing=im[it.ingId];if(!ing)continue;
      const stp=ing.step||5;const canAdd=Math.min((ing.maxAmt||it.amt*2)-it.amt,Math.ceil((deficit-added)/(ing.per100?.f||1)*100));
      const bump=Math.max(stp,Math.round(canAdd/stp)*stp);it.amt=Math.min(ing.maxAmt||it.amt+bump,it.amt+bump);
      added=sa(meals,im).f-tot.f+added;}}
  return meals;
}

function microCheck(meals,isTraining){
  const rda=getRDA(isTraining);
  const totals={};Object.keys(rda).forEach(k=>{totals[k]=0;});
  meals.forEach(m=>m.items.forEach(it=>{
    const md=MI[it.ingId];if(!md)return;
    const mult=md.isP?it.amt:(it.amt/100);
    Object.keys(rda).forEach(k=>{if(md[k])totals[k]+=md[k]*mult;});
  }));
  return Object.keys(rda).map(k=>({
    key:k,name:RDA_LABELS[k],unit:RDA_UNITS[k],rda:rda[k],
    actual:Math.round(totals[k]*10)/10,
    pct:Math.min(999,Math.round(totals[k]/rda[k]*100)),
    ok:totals[k]>=rda[k]*0.7,
    tip:RDA_TIPS[k]
  }));
}

// Nutrient synergy & inhibitor analysis — checks within each meal
const HIGH_IRON=["beef-mince","baby-spinach","kidney-beans","black-beans","dark-choc","chickpeas","turkey-mince"];
const HIGH_CALCIUM=["hp-yogurt","greek-light","skimmed-milk","cottage-cheese","whey"];
const HIGH_VIT_C=["peppers","broccoli","raspberries","blueberries","sp-chips","baby-spinach"];
const HIGH_ZINC=["beef-mince","whole-egg","chickpeas","porridge-oats","dark-choc","peanut-butter"];
const HIGH_FAT_SOL=["salmon","whole-egg","avocado","butter","olive-oil","dark-choc","peanut-butter"]; // fat sources for A/D/E/K

function synCheck(meals){
  const notes=[];const seen=new Set();
  const addNote=(type,icon,msg)=>{
    // Global dedup key = tip body after "MealName: " — strips meal context so the same
    // tip for multiple meals is only added once (first occurrence wins).
    const tipBody=msg.includes(": ")?msg.slice(msg.indexOf(": ")+2):msg;
    const k=tipBody.slice(0,60);
    if(seen.has(k))return;seen.add(k);
    notes.push({type,icon,msg,tipBody});
  };

  meals.forEach(m=>{
    const ids=m.items.map(it=>it.ingId);
    const hasIron=ids.some(id=>HIGH_IRON.includes(id));
    const hasCalc=ids.some(id=>HIGH_CALCIUM.includes(id));
    const hasVitC=ids.some(id=>HIGH_VIT_C.includes(id));
    const hasZinc=ids.some(id=>HIGH_ZINC.includes(id));
    const hasFat=ids.some(id=>HIGH_FAT_SOL.includes(id));

    // INHIBITORS
    if(hasIron&&hasCalc)addNote("warn","⚠️",`${gS(m.name)}: Calcium inhibits iron absorption by ~50%. Separate dairy from iron-rich foods.`);
    if(hasZinc&&hasCalc&&!hasIron)addNote("warn","⚠️",`${gS(m.name)}: Calcium reduces zinc uptake. Space dairy from zinc sources.`);

    // SYNERGIES
    if(hasIron&&hasVitC)addNote("good","✅",`${gS(m.name)}: Vit C + Iron = up to 3× absorption.`);
    if(ids.includes("baby-spinach")&&hasFat)addNote("good","✅",`${gS(m.name)}: Fat unlocks fat-soluble vitamins (A, K) from spinach.`);
    if(ids.includes("salmon")&&hasFat)addNote("good","✅",`${gS(m.name)}: Omega-3 + fat = optimal absorption.`);

    // BIO-HACKER BOOSTERS — micro-additions for max nutrient extraction
    if(hasIron&&!hasVitC)addNote("tip","🧪",`${gS(m.name)}: Add a squeeze of lemon juice (~5ml, 1kcal) to boost iron absorption 3×.`);
    if(ids.includes("jalfrezi")||ids.includes("chilli-mix"))addNote("tip","🧪",`${gS(m.name)}: Add a pinch of black pepper (2kcal) — piperine boosts curcumin absorption from spices by 2000%.`);
    if(ids.includes("baby-spinach")&&!hasFat)addNote("tip","🧪",`${gS(m.name)}: Drizzle 5ml olive oil (40kcal) on spinach — unlocks beta-carotene and vitamin K absorption.`);
    if(ids.includes("porridge-oats"))addNote("tip","🧪",`${gS(m.name)}: Add a pinch of cinnamon (0kcal) — helps regulate blood sugar response from oats.`);
    if(ids.includes("whole-egg")&&!ids.includes("baby-spinach"))addNote("tip","🧪",`${gS(m.name)}: Pair eggs with spinach or tomatoes — the fat in yolks boosts carotenoid absorption by 3-8×.`);
    if(ids.includes("hp-yogurt")||ids.includes("greek-light"))addNote("tip","🧪",`${gS(m.name)}: Add 5g ground flaxseed (27kcal) for omega-3 + fibre. Pairs well with yogurt.`);
    if((ids.includes("chicken-breast")||ids.includes("beef-mince"))&&!ids.includes("baby-spinach"))addNote("tip","🧪",`${gS(m.name)}: Add a handful of rocket/watercress (3kcal) — nitrates improve blood flow to muscles.`);
    if(ids.includes("dark-choc"))addNote("good","✅",`${gS(m.name)}: Dark chocolate provides magnesium, iron, and flavanols. Pair with berries for antioxidant synergy.`);

// FIBER CHECK & SUPPLEMENT SUGGESTION ENGINE
// Triggers when: total_fiber < 30g OR soluble < 10g OR insoluble < 15g
// ═══════════════════════════════════════════════════════════
function fiberCheck(meals,im){
  let sol=0,insol=0;
  meals.forEach(m=>m.items.forEach(it=>{
    const fd=FIBER_DATA[it.ingId];
    const ing=im?.[it.ingId];
    // FIBER_DATA takes precedence; Pantry items carry sol_fiber/insol_fiber inline
    const fSol=fd?.sol??ing?.sol_fiber??0;
    const fInsol=fd?.insol??ing?.insol_fiber??0;
    if(!fSol&&!fInsol)return;
    const mult=(fd?.isP||ing?.unit==="piece")?it.amt:(it.amt/100);
    sol+=fSol*mult;insol+=fInsol*mult;
  }));
  sol=Math.round(sol*10)/10;insol=Math.round(insol*10)/10;
  const total=Math.round((sol+insol)*10)/10;
  const defTotal=Math.max(0,Math.round((FIBER_TARGETS.total-total)*10)/10);
  const defSol=Math.max(0,Math.round((FIBER_TARGETS.sol-sol)*10)/10);
  const defInsol=Math.max(0,Math.round((FIBER_TARGETS.insol-insol)*10)/10);
  const triggered=total<FIBER_TARGETS.total||sol<FIBER_TARGETS.sol||insol<FIBER_TARGETS.insol;
  // Psyllium is 85% soluble — calculate caps for whichever deficit requires most
  // 1 cap = 0.5g total = 0.425g soluble.  Cap recommendation at 12 (6g fiber)
  const psylliumCaps=triggered?Math.min(12,Math.ceil(Math.max(defTotal/PSYLLIUM_FIBER_PER_CAP,defSol/0.425))):0;
  return{total,sol,insol,defTotal,defSol,defInsol,triggered,psylliumCaps};
}

// Proportional Ratio-Locked Scaling
// Scales all unlocked items of a given macro role within one meal by ±10%
// while preserving their current ratio to each other (Chemical Consistency).
// role: 'p' | 'c' | 'f'   direction: +1 = up 10%, -1 = down 10%
function scaleRecipeGroup(meals,mealId,role,direction,im){
  const mIdx=meals.findIndex(m=>m.id===mealId);
  if(mIdx===-1)return meals;
  const groupIdxs=meals[mIdx].items
    .map((_,i)=>i)
    .filter(i=>!meals[mIdx].items[i].locked&&macroRole(im[meals[mIdx].items[i].ingId])===role);
  if(!groupIdxs.length)return meals;
  const scale=direction>0?1.10:0.90;
  const result=dc(meals);
  groupIdxs.forEach(i=>{
    const it=result[mIdx].items[i];
    const ing=im[it.ingId];if(!ing)return;
    it.amt=clampAmt(ing,it.amt*scale);
  });
  return result;
}

// Overflow Logic — when a capped item can't absorb its share of calories,
// push the remainder into unlocked secondary carb sources within the same meal.
function overflowToSecondaryCarb(meals,gap,im){
  if(gap<=20)return meals;
  const result=dc(meals);
  const mealsWithCaps=result.filter(meal=>
    !meal.fixed&&meal.items.some(it=>{const ing=im[it.ingId];return ing&&!it.locked&&it.amt>=ingMax(ing);})
  );
  if(!mealsWithCaps.length)return result;
  let rem=gap;
  for(const meal of mealsWithCaps){
    if(rem<=10)break;
    const carbTargets=meal.items.filter(it=>{const ing=im[it.ingId];
      return ing&&!it.locked&&macroRole(ing)==="c"&&it.amt<ingMax(ing);});
    if(!carbTargets.length)continue;
    const perTarget=rem/carbTargets.length;
    for(const it of carbTargets){
      if(rem<=10)break;
      const ing=im[it.ingId];
      const calPer=ing.unit==="piece"?(ing.perUnit?.cals||0):((ing.per100?.cals||100)/100);
      if(calPer<=0)continue;
      const addAmt=Math.min(perTarget/calPer,ingMax(ing)-it.amt);
      if(addAmt<(ing.step||5))continue;
      const before=ci(ing,it.amt).cals;
      it.amt=clampAmt(ing,it.amt+addAmt);
      rem-=ci(ing,it.amt).cals-before;
    }
  }
  return result;
}

// MEAL SHUFFLING & CHRONOLOGICAL SORT
// ═══════════════════════════════════════════════════════════
// Parse "8:30 PM" / "12:00 PM" / "9:00 AM" to sortable minutes-since-midnight
function parseTimeMins(t){
  if(!t)return 9999;
  const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 9999;
  let h=parseInt(m[1]);const mn=parseInt(m[2]);
  if(m[3].toUpperCase()==="PM"&&h!==12)h+=12;
  else if(m[3].toUpperCase()==="AM"&&h===12)h=0;
  return h*60+mn;
}
// Convert 24h "HH:MM" from <input type="time"> to "H:MM AM/PM"
function fmtTime24(t){
  if(!t)return"";const[h,m]=t.split(":").map(Number);
  const ampm=h>=12?"PM":"AM";const h12=h%12||12;
  return`${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}
function sortMealsByTime(meals){
  return [...meals].sort((a,b)=>parseTimeMins(a.time)-parseTimeMins(b.time));
}
// Assign the highest-calorie non-fixed meal to the metabolically optimal time slot,
// then re-sort all meals chronologically.
// Training day → "8:30 PM" (post-workout anabolic window)
// Rest day     → "12:00 PM" (midday metabolic peak)
function shuffleMealTiming(meals,dayType,im){
  const isFootball=dayType==="football";
  const isTraining=dayType==="training"||dayType===true; // backward compat with boolean
  if(isFootball){
    // Apply football-specific timing: remap every meal by its template ID
    const result=dc(meals);
    result.forEach(m=>{if(FOOTBALL_TIMES[m.id])m.time=FOOTBALL_TIMES[m.id];});
    return sortMealsByTime(result);
  }
  let bestIdx=-1,bestCals=-1;
  meals.forEach((meal,i)=>{if(meal.fixed)return;const c=sm(meal,im).cals;if(c>bestCals){bestCals=c;bestIdx=i;}});
  if(bestIdx===-1)return sortMealsByTime(meals);
  const result=dc(meals);
  result[bestIdx].time=isTraining?"8:30 PM":"12:00 PM";
  return sortMealsByTime(result);
}

// TDEE Calculator — Katch-McArdle (if BF%) or Mifflin-St Jeor, with lifestyle adjustments
function ftToCm(ft){const parts=String(ft).split(".");const feet=parseInt(parts[0])||0;const inches=parseInt(parts[1])||0;return Math.round((feet*30.48)+(inches*2.54));}
function cmToFtIn(cm){const totalIn=cm/2.54;const ft=Math.floor(totalIn/12);const inn=Math.round(totalIn%12);return`${ft}.${inn}`;}
function kgToLbs(kg){return+(parseFloat(kg)*2.20462).toFixed(1);}
function lbsToKg(lbs){return+(parseFloat(lbs)/2.20462).toFixed(1);}
function inToCm(inches){return+(parseFloat(inches)*2.54).toFixed(1);}
function cmToIn(cm){return+(parseFloat(cm)/2.54).toFixed(1);}
// Display value in user's chosen unit
function dispWeight(kg,unit){return unit==="lbs"?kgToLbs(kg):kg;}
function dispHeight(ftin,unit){return unit==="cm"?ftToCm(ftin):ftin;}
function dispWaist(inches,unit){return unit==="cm"?inToCm(inches):inches;}
// Parse input back to internal units
function parseWeight(val,unit){return unit==="lbs"?String(lbsToKg(val)):val;}
function parseHeight(val,unit){return unit==="cm"?cmToFtIn(parseFloat(val)):val;}
function parseWaist(val,unit){return unit==="cm"?String(cmToIn(val)):val;}
function calcBMR(weight,heightCm,age,gender,bodyFat){
  if(bodyFat>0){const lbm=weight*(1-bodyFat/100);return Math.round(370+(21.6*lbm));}
  return Math.round(gender==="male"?(10*weight+6.25*heightCm-5*age+5):(10*weight+6.25*heightCm-5*age-161));
}
function calcTDEE(weight,heightCm,age,gender,activity,bodyFat,waist,sleep,stress,job){
  let bmr;
  if(bodyFat>0){
    // Katch-McArdle — more accurate with body fat
    const lbm=weight*(1-bodyFat/100);
    bmr=370+(21.6*lbm);
  }else{
    // Mifflin-St Jeor
    bmr=gender==="male"?(10*weight+6.25*heightCm-5*age+5):(10*weight+6.25*heightCm-5*age-161);
  }
  // Activity multiplier
  const mult={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
  let tdee=bmr*(mult[activity]||1.55);
  // Waist adjustment — higher waist:height ratio suggests higher body fat
  if(waist>0&&heightCm>0){const whr=(waist*2.54)/heightCm;if(whr>0.53)tdee*=0.97;if(whr>0.58)tdee*=0.95;}
  // Sleep adjustment — poor sleep reduces metabolism
  if(sleep==="poor")tdee*=0.95;else if(sleep==="fair")tdee*=0.98;
  // Stress — high cortisol increases fat storage, reduce surplus
  if(stress==="high")tdee*=0.97;
  // Desk job penalty
  if(job==="desk")tdee*=0.97;else if(job==="mixed")tdee*=1.0;else if(job==="active")tdee*=1.05;
  return Math.round(tdee);
}

// ═══════════════════════════════════════════════════════════
// DIARY REDUCER — Atomic state updates for all diary data
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// ADAPTIVE TDEE — Closed-Loop Metabolic Controller
// Treats formula TDEE as an initial seed, then recursively
// corrects using real-world weight telemetry each cycle.
// ═══════════════════════════════════════════════════════════

// Exponentially-weighted moving average with recency bias
// α controls how fast we forget old data (0.3 = recent weeks 3× more important)
function adaptiveTDEE(history, formulaSeed, alpha=0.3, bmr=0){
  const base={tdee:formulaSeed,confidence:0,source:"formula",correction:0,trend:[],plateau:false,floor:0};
  if(!history||!history.length)return base;
  const valid=history.filter(h=>h.actual>800&&h.actual<5000);
  if(!valid.length)return base;

  // Metabolic floor = 75% of BMR — never suggest below this
  const metaFloor=bmr>0?Math.round(bmr*0.75):0;

  if(valid.length===1){
    let blend=Math.round((formulaSeed+valid[0].actual)/2);
    const hitFloor=metaFloor>0&&blend<metaFloor;
    if(hitFloor)blend=metaFloor;
    return{tdee:blend,confidence:25,source:"blended",correction:blend-formulaSeed,
      trend:[{w:valid[0].week,v:valid[0].actual}],plateau:hitFloor,floor:metaFloor,dataPoints:1};
  }

  // EWMA
  let wSum=0,wTotal=0;
  for(let i=valid.length-1;i>=0;i--){
    const age=valid.length-1-i;
    const w=Math.pow(1-alpha,age);
    wSum+=valid[i].actual*w;
    wTotal+=w;
  }
  const ewma=Math.round(wSum/wTotal);
  const conf=Math.min(95,Math.round(95*(1-Math.exp(-0.4*valid.length))));
  const formulaW=Math.max(0,(100-conf)/100);
  const dataW=1-formulaW;
  let final=Math.round(ewma*dataW+formulaSeed*formulaW);

  // Plateau detection — if EWMA is trending down but last 3 weeks show <0.1kg loss
  // despite a deficit, it's likely water retention or metabolic adaptation
  let plateauDetected=false;
  if(valid.length>=3){
    const last3=valid.slice(-3);
    const avgChange=last3.reduce((s,h)=>s+(h.change||0),0)/3;
    const avgDeficit=last3.reduce((s,h)=>s+(h.predicted-h.avgCal),0)/3;
    // Eating in deficit but barely losing = plateau
    if(avgDeficit>100&&Math.abs(avgChange)<0.1)plateauDetected=true;
  }

  // Enforce metabolic floor
  const hitFloor=metaFloor>0&&final<metaFloor;
  if(hitFloor){final=metaFloor;plateauDetected=true;}

  const trend=valid.map(h=>({w:h.week,v:h.actual}));
  const mean=valid.reduce((s,h)=>s+h.actual,0)/valid.length;
  const variance=Math.round(Math.sqrt(valid.reduce((s,h)=>s+Math.pow(h.actual-mean,2),0)/valid.length));

  return{
    tdee:final,ewma,confidence:conf,
    source:conf>=60?"adaptive":"blended",
    correction:final-formulaSeed,variance,trend,
    dataPoints:valid.length,
    plateau:plateauDetected,floor:metaFloor
  };
}

const initDiary=(t,c)=>({types:t(),checks:c(),cm:{},comp:{},wCal:null,wMacPct:null,wt:{start:"",end:""},stallAdj:0});

function diaryReducer(state,action){
  switch(action.type){
    case 'RESET':return initDiary(action.initT,action.initC);
    case 'LOAD':return{...state,...action.data};
    case 'LOAD_WT':return{...state,wt:action.wt};
    case 'SET_TYPES':return{...state,types:action.types,checks:action.checks!==undefined?action.checks:state.checks,cm:action.cm!==undefined?action.cm:state.cm};
    case 'SET_CHECKS':return{...state,checks:action.checks};
    case 'SET_CM':return{...state,cm:structuredClone(action.cm)};
    case 'UPDATE_DAY':return{...state,cm:{...state.cm,[action.day]:structuredClone(action.meals)}};
    case 'UPDATE_MEAL':{const dayCopy=structuredClone(state.cm[action.day]||[]);const mIdx=dayCopy.findIndex(m=>m.id===action.mealId);if(mIdx!==-1)dayCopy[mIdx]=structuredClone(action.meal);return{...state,cm:{...state.cm,[action.day]:dayCopy}};}
    case 'COMPLETE_DAY':return{...state,comp:{...state.comp,[action.day]:action.cals}};
    case 'UNCOMPLETE_DAY':{const co={...state.comp};delete co[action.day];return{...state,comp:co};}
    case 'APPLY':return{...state,wCal:action.wCal,wMacPct:action.wMacPct,cm:action.cm!==undefined?action.cm:state.cm};
    case 'SET_WCAL':return{...state,wCal:action.wCal};
    case 'SET_WT':return{...state,wt:action.wt};
    case 'SET_STALL':return{...state,stallAdj:action.stallAdj};
    default:return state;
  }
}

function autoCat(cals,p,c,f){
  // Returns {cat, defAmt, maxAmt} based on macros per 100g
  const kcal=+cals||0,pr=+p||0,ca=+c||0,fa=+f||0;
  // Protein first — high protein, low carb
  if(pr>=15&&ca<20)return{cat:"Protein",defAmt:150,maxAmt:350};
  // Dairy — decent protein + fat combo (milk, cheese, yogurt)
  if(pr>=5&&fa>=2&&ca<30&&kcal<200)return{cat:"Dairy",defAmt:150,maxAmt:300};
  // Whey/protein powder — very high protein
  if(pr>=50)return{cat:"Protein",defAmt:30,maxAmt:60};
  // Fats — high fat, low carb (nuts, oils, butter)
  if(fa>=20&&ca<20)return{cat:"Fats",defAmt:15,maxAmt:50};
  // Carbs — high carb staples (rice, pasta, oats, bread)
  if(ca>=50&&pr<15)return{cat:"Carbs",defAmt:75,maxAmt:150};
  // Veg — very low calorie
  if(kcal<40&&ca<10)return{cat:"Veg",defAmt:80,maxAmt:250};
  // Fruit — low cal, naturally sweet, minimal protein
  if(kcal<70&&ca>=5&&pr<2&&fa<1)return{cat:"Fruit",defAmt:80,maxAmt:200};
  // Snack — moderate everything, typically processed
  if(kcal>=300&&kcal<550&&ca>=20)return{cat:"Snack",defAmt:30,maxAmt:100};
  // Sauce/condiment — low serving size, high flavour
  if(kcal<150&&ca>=5&&pr<5)return{cat:"Sauce",defAmt:30,maxAmt:100};
  // Premade meal — moderate protein + carbs + fat together (like Bhuna)
  if(pr>=3&&ca>=5&&fa>=2&&kcal>=80)return{cat:"Premade",defAmt:300,maxAmt:500};
  // Protein-ish — moderate protein that didn't fit above
  if(pr>=8)return{cat:"Protein",defAmt:100,maxAmt:250};
  return{cat:"Other",defAmt:100,maxAmt:300};
}


// Sequential tip system — shows one at a time in order, no auto-dismiss
const TIP_ORDER=["copy-day","hydration","lock-ingredient","spread-leftover","complete-day"];
// Track which tips are currently mounted to prevent duplicates
const _mountedTips=new Set();

function Tip({tipKey,title,text,position="below",align="right",onlyFirst=false,children}){
  const idxKey="ept:tipIdx";
  const getIdx=()=>parseInt(localStorage.getItem(idxKey)||"0");
  const myIdx=TIP_ORDER.indexOf(tipKey);
  // Prevent duplicate: if onlyFirst is set and this key is already mounted, don't show
  const canMount=!onlyFirst||!_mountedTips.has(tipKey);
  const[show,setShow]=useState(()=>canMount&&myIdx>=0&&getIdx()===myIdx);

  useEffect(()=>{
    if(onlyFirst)_mountedTips.add(tipKey);
    const check=()=>{setShow(canMount&&myIdx>=0&&getIdx()===myIdx);};
    window.addEventListener("tipDismissed",check);
    return()=>{
      window.removeEventListener("tipDismissed",check);
      if(onlyFirst)_mountedTips.delete(tipKey);
    };
  },[]);

  const dismiss=()=>{
    const next=getIdx()+1;
    localStorage.setItem(idxKey,String(next));
    setShow(false);
    window.dispatchEvent(new Event("tipDismissed"));
  };

  const isAbove=position==="above";
  const arrowStyle={position:"absolute",width:10,height:10,background:"rgba(15,23,42,0.97)",border:"1px solid rgba(59,130,246,0.3)",
    ...(isAbove
      ?{bottom:-6,[align==="right"?"right":"left"]:18,borderTop:"none",borderLeft:"none",transform:"rotate(45deg)"}
      :{top:-6,[align==="right"?"right":"left"]:18,borderBottom:"none",borderRight:"none",transform:"rotate(45deg)"})};
  return(<div style={{position:"relative",display:"inline-block"}}>
    {children}
    {show&&(<div onClick={e=>{e.stopPropagation();dismiss();}} style={{position:"absolute",...(isAbove?{bottom:"calc(100% + 8px)"}:{top:"calc(100% + 8px)"}), ...(align==="right"?{right:0}:{left:0}),background:"rgba(15,23,42,0.97)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:10,padding:"10px 12px",width:195,maxWidth:"85vw",zIndex:200,boxShadow:"0 4px 20px rgba(0,0,0,0.5)",cursor:"pointer"}}>
      <div style={arrowStyle}/>
      <div style={{fontSize:9,color:"#334155",marginBottom:3}}>Tip {myIdx+1} of {TIP_ORDER.length} · tap anywhere to dismiss</div>
      <div style={{fontSize:11,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{title}</div>
      <div style={{fontSize:10,color:"#64748b",lineHeight:1.5,marginBottom:6}}>{text}</div>
    </div>)}
  </div>);}

      <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>⚠️ App Error</div>
      <div>{this.state.error?.message}</div>
      <div style={{marginTop:8,color:"#64748b"}}>{this.state.error?.stack?.slice(0,500)}</div>
    </div>);
    return this.props.children;
  }
}

  const archiveWeek=async(finalComp)=>{

                {change<=-0.15&&change>=-0.5&&<p style={{margin:0}}>Good pace: {(change*-1).toFixed(1)}kg lost at ~{Math.round(Math.abs(changeCals)/7)} kcal/day deficit.</p>}
                {change<-0.5&&<p style={{margin:0}}>Rapid loss ({(change*-1).toFixed(1)}kg). Consider +{Math.round(Math.abs(changeCals)/7/3)} kcal/day to protect muscle.</p>}
                {change>0.15&&<p style={{margin:0}}>Gained {change.toFixed(1)}kg — your actual TDEE is ~{actualTDEE}. Reduce by ~{Math.abs(sugAdj2)} kcal/day.</p>}
              </div>
              {Math.abs(sugAdj2)>0&&(<button style={{...S.cb,width:"100%",fontSize:11}} onClick={async()=>{
                dispatch({type:'SET_WCAL',wCal:sugCal2});setCalIn(String(sugCal2));
                const newCm={...cm};DAYS.forEach(d=>{const di=DAYS.indexOf(d);if(isPast(di)||comp[d])return;
                  const tgt=Math.round(sugCal2*dayMult(d));
                  newCm[d]=autoRebalance(gTpl(d),tgt,im,[],cfPref,bW);});
                dispatch({type:'SET_CM',cm:newCm});sv(types,checks,newCm,comp,sugCal2,effMac);
                fl(`Adjusted to ${sugCal2} kcal/day`);setTab("meals");
              }}>Apply {sugCal2} kcal/day to this week ({sugAdj2>0?"+":""}{sugAdj2})</button>)}
              {Math.abs(sugAdj2)<=0&&<div style={{fontSize:10,color:"#4ade80"}}>✅ Current target well matched to your body.</div>}
            </div>);
          })()}
        </div>);
      })()}

      {/* ADMIN TAB */}
      {tab==="admin"&&isAdmin&&(<div style={{marginTop:4}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontSize:18}}>⚙️</span>
          <div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:700,color:"#f1f5f9"}}>Admin Panel</div>
            <div style={{fontSize:9,color:"#475569"}}>Only visible to you</div>
          </div>
        </div>

        {/* Stripe URL */}
        <div style={{background:"rgba(30,41,59,0.35)",borderRadius:12,border:"1px solid rgba(148,163,184,0.08)",padding:14,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:6}}>Stripe Payment Link</div>
          <div style={{fontSize:9,color:"#475569",marginBottom:8}}>Current: <span style={{color:stripeUrl.includes("test")?"#fbbf24":"#4ade80",fontWeight:700}}>{stripeUrl.includes("test")?"⚠️ Test mode":"✅ Live mode"}</span></div>
          <div style={{display:"flex",gap:6}}>
            <input style={{...S.fi,flex:1,marginBottom:0,fontSize:10}} placeholder="https://buy.stripe.com/..." value={adminStripeUrl} onChange={e=>setAdminStripeUrl(e.target.value.trim())}/>
            <button style={{...S.cb,whiteSpace:"nowrap"}} onClick={async()=>{
              if(!adminStripeUrl.startsWith("https://buy.stripe.com/"))return fl("Invalid Stripe URL");
              try{
                await fbDb.collection("config").doc("app").set({stripeUrl:adminStripeUrl},{merge:true});
                setStripeUrl(adminStripeUrl);
                fl("Stripe URL updated ✅");
              }catch{fl("Failed to save");}
            }}>Save</button>
          </div>
        </div>

        {/* Create code */}
        <div style={{background:"rgba(30,41,59,0.35)",borderRadius:12,border:"1px solid rgba(148,163,184,0.08)",padding:14,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:10}}>Generate Access Code</div>
          {/* Code name */}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <input style={{...S.fi,flex:1,marginBottom:0,letterSpacing:"2px",textTransform:"uppercase"}} placeholder="Custom code (optional — leave blank to auto-generate)" value={adminNewCode} onChange={e=>setAdminNewCode(e.target.value.toUpperCase())} maxLength={12}/>
          </div>
          {/* Max uses */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:6}}>Max Uses</div>
            <div style={{display:"flex",gap:4}}>
              {[1,2,5,10,0].map(n=>(<button key={n} onClick={()=>setAdminMaxUses(n)} style={{flex:1,padding:"6px 4px",borderRadius:7,border:`1.5px solid ${adminMaxUses===n?"rgba(59,130,246,0.6)":"rgba(51,65,85,0.4)"}`,background:adminMaxUses===n?"rgba(59,130,246,0.15)":"transparent",color:adminMaxUses===n?"#93c5fd":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer"}}>{n===0?"∞":n}</button>))}
            </div>
          </div>
          {/* Required email */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:6}}>Personal — Restrict to Google Email <span style={{color:"#334155",fontWeight:400,textTransform:"none",letterSpacing:0}}>· leave blank for anyone</span></div>
            <input style={{...S.fi,marginBottom:0}} placeholder="e.g. friend@gmail.com (optional)" value={adminReqEmail} onChange={e=>setAdminReqEmail(e.target.value.toLowerCase())}/>
          </div>
          {/* Expiry date + time */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:9,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:6}}>Trial ends at (optional) — UK Time <span style={{color:"#334155",fontWeight:400,textTransform:"none",letterSpacing:0}}>· leave blank for 7 days from redemption</span></div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="date" style={{...S.fi,flex:1,marginBottom:0,colorScheme:"dark"}} value={adminExpDate} onChange={e=>setAdminExpDate(e.target.value)} min={new Date().toISOString().slice(0,10)}/>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <button onClick={()=>setAdminExpHour(h=>(h%12)+1)} style={{width:22,height:18,borderRadius:4,border:"1px solid rgba(148,163,184,0.15)",background:"rgba(30,41,59,0.5)",color:"#94a3b8",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▲</button>
                <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",width:24,textAlign:"center"}}>{String(adminExpHour).padStart(2,"0")}</div>
                <button onClick={()=>setAdminExpHour(h=>((h-2+12)%12)+1)} style={{width:22,height:18,borderRadius:4,border:"1px solid rgba(148,163,184,0.15)",background:"rgba(30,41,59,0.5)",color:"#94a3b8",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▼</button>
              </div>
              <span style={{fontSize:18,fontWeight:700,color:"#475569"}}>:</span>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <button onClick={()=>setAdminExpMin(m=>(m+5)%60)} style={{width:22,height:18,borderRadius:4,border:"1px solid rgba(148,163,184,0.15)",background:"rgba(30,41,59,0.5)",color:"#94a3b8",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▲</button>
                <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",width:24,textAlign:"center"}}>{String(adminExpMin).padStart(2,"0")}</div>
                <button onClick={()=>setAdminExpMin(m=>(m-5+60)%60)} style={{width:22,height:18,borderRadius:4,border:"1px solid rgba(148,163,184,0.15)",background:"rgba(30,41,59,0.5)",color:"#94a3b8",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▼</button>
              </div>
              <button onClick={()=>setAdminExpAmPm(a=>a==="AM"?"PM":"AM")} style={{padding:"6px 10px",borderRadius:8,border:`1.5px solid ${adminExpAmPm==="AM"?"rgba(59,130,246,0.5)":"rgba(249,115,22,0.5)"}`,background:adminExpAmPm==="AM"?"rgba(23,37,84,0.4)":"rgba(67,20,7,0.4)",color:adminExpAmPm==="AM"?"#93c5fd":"#fdba74",fontSize:13,fontWeight:700,cursor:"pointer",minWidth:44,textAlign:"center"}}>{adminExpAmPm}</button>
              {adminExpDate&&<button onClick={()=>setAdminExpDate("")} style={{fontSize:9,color:"#64748b",background:"none",border:"none",cursor:"pointer",padding:2,whiteSpace:"nowrap"}}>Clear</button>}
            </div>
            {adminExpDate&&<div style={{fontSize:9,color:"#fbbf24",marginTop:4}}>⏰ Trial ends: {new Date(`${adminExpDate}T${String((adminExpHour%12)+(adminExpAmPm==="PM"?12:0)).padStart(2,"0")}:${String(adminExpMin).padStart(2,"0")}:00`).toLocaleString("en-GB",{timeZone:"Europe/London",day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})} UK time</div>}
          </div>
          <button style={{...S.cb,width:"100%"}} disabled={adminBusy} onClick={createCode}>{adminBusy?"…":"Generate Code"}</button>
        </div>

        {/* Unused / active codes */}
        <div style={{background:"rgba(30,41,59,0.35)",borderRadius:12,border:"1px solid rgba(148,163,184,0.08)",padding:14,marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:"#4ade80",textTransform:"uppercase",letterSpacing:"1.2px"}}>Unused Codes ({adminCodes.length})</div>
            <button style={S.sb} onClick={async()=>{await loadAdminCodes();fl("Codes refreshed ✅");}}>Refresh</button>
          </div>
          {adminCodes.length===0&&<div style={{fontSize:10,color:"#475569",textAlign:"center",padding:"8px 0"}}>No unused codes</div>}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {adminCodes.map(c=>{
              const exp=c.expiryAt?.toDate?.();
              const expired=exp&&exp<new Date();
              return(<div key={c.id} style={{padding:"8px 10px",borderRadius:8,background:"rgba(15,23,42,0.4)",border:`1px solid ${expired?"rgba(239,68,68,0.2)":"rgba(34,197,94,0.15)"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{fontSize:15,fontWeight:700,color:expired?"#64748b":"#f1f5f9",letterSpacing:"3px",textDecoration:expired?"line-through":"none"}}>{c.code}</div>
                  <button onClick={()=>deleteCode(c.code)} style={{padding:"3px 8px",borderRadius:5,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(69,10,10,0.3)",color:"#f87171",fontSize:9,fontWeight:700,cursor:"pointer",flexShrink:0}}>Delete</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  <span style={{fontSize:9,color:"#475569"}}>Uses: {c.usesCount||0}/{c.maxUses===0?"∞":c.maxUses||1}</span>
                  {c.requiredEmail&&<span style={{fontSize:9,color:"#93c5fd"}}>🔒 {c.requiredEmail}</span>}
                  {exp&&<span style={{fontSize:9,color:expired?"#f87171":"#fbbf24"}}>⏰ {expired?"Expired":"Ends"}: {exp.toLocaleString("en-GB",{timeZone:"Europe/London",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>}
                </div>
              </div>);
            })}
          </div>
        </div>

        {/* Used codes */}
        <div style={{background:"rgba(30,41,59,0.35)",borderRadius:12,border:"1px solid rgba(148,163,184,0.08)",padding:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#f87171",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:10}}>Used Codes ({adminUsedCodes.length})</div>
          {adminUsedCodes.length===0&&<div style={{fontSize:10,color:"#475569",textAlign:"center",padding:"8px 0"}}>No used codes yet</div>}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {adminUsedCodes.map(c=>{
              const usedAt=c.lastUsedAt?.toDate?.();
              return(<div key={c.id} style={{padding:"8px 10px",borderRadius:8,background:"rgba(15,23,42,0.4)",border:"1px solid rgba(239,68,68,0.1)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                  <div style={{fontSize:15,fontWeight:700,color:"#475569",letterSpacing:"3px",textDecoration:"line-through"}}>{c.code}</div>
                  <button onClick={()=>deleteCode(c.code)} style={{padding:"3px 8px",borderRadius:5,border:"1px solid rgba(239,68,68,0.2)",background:"rgba(69,10,10,0.2)",color:"#64748b",fontSize:9,fontWeight:700,cursor:"pointer",flexShrink:0}}>Delete</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  <span style={{fontSize:9,color:"#4ade80"}}>✓ Used {c.usesCount||1}× by {c.lastUsedBy||"unknown"}</span>
                  {usedAt&&<span style={{fontSize:9,color:"#475569"}}>{usedAt.toLocaleString("en-GB",{timeZone:"Europe/London",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>}
                </div>
              </div>);
            })}
          </div>
        </div>
      </div>)}

    </div>)}

  </>
  );
}

let appMounted = false;
function googleSignIn(){
  const provider = new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(function(err) {
    console.warn("Popup failed, trying redirect", err);
    fbAuth.signInWithRedirect(provider);
  });
}
window.googleSignIn = googleSignIn;

fbAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
fbAuth.getRedirectResult().catch(function(e){ console.warn("Redirect result:", e); });

// Mount app immediately — demo shows for guests, access check runs for signed-in users
if (!appMounted) {
  appMounted = true;
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
}

fbAuth.onAuthStateChanged(async function(user) {
  window.fbUser = user;
  if (user) {
    await syncFromCloud();
    // If data was loaded from cloud and we haven't already reloaded this session,
    // reload once so the app initialises with the user's data already in localStorage
    if(window.fbSyncStatus==="Loaded from cloud"&&!sessionStorage.getItem("ept:synced")){
      sessionStorage.setItem("ept:synced","1");
      window.location.reload();
      return;
    }
    // Notify React app that auth state changed
    window.dispatchEvent(new Event("fbAuthReady"));
  } else {
    window.dispatchEvent(new Event("fbAuthReady"));
  }
});
